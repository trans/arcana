name: Package

on:
  release:
    types: [published]
  workflow_dispatch:

# Opt every JS action into Node 24 ahead of the forced 2026-06-02 cutover,
# so failures surface here instead of on a release day.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  arch:
    name: Arch Linux (.pkg.tar.zst)
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # Pre-install every PKGBUILD dep so makepkg never has to call
          # pacman itself (would require sudo). base-devel already brings
          # gcc, gcc-libs, make, fakeroot, etc.
          pacman -Syu --noconfirm --needed \
            crystal shards git sudo \
            openssl pcre2 gc zlib
          # makepkg refuses to run as root; build under an unprivileged user.
          useradd -m builder
          chown -R builder:builder .

      - name: Build with makepkg
        run: |
          cd pkg
          sudo -u builder makepkg --noconfirm

      - name: Collect package
        run: |
          mkdir -p dist
          mv pkg/arcana-*.pkg.tar.zst dist/
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcana-arch
          path: dist/arcana-*.pkg.tar.zst

  deb:
    name: Debian Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal and build deps
        run: |
          curl -fsSL https://crystal-lang.org/install.sh | sudo bash
          sudo apt-get install -y crystal build-essential \
            libssl-dev libpcre2-dev libgc-dev zlib1g-dev \
            dpkg-dev debhelper

      - name: Prepare debian packaging
        run: ln -s pkg/debian debian

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect deb
        run: |
          mkdir -p dist
          cp ../arcana_*.deb dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcana-deb
          path: dist/*.deb

  release-assets:
    name: Upload release assets
    if: github.event_name == 'release'
    needs: [arch, deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            arcana-arch/*
            arcana-deb/*
